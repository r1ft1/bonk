services:
  logic:
    build:
      context: ./logic
    environment:
      - ORIGIN_URL=${ORIGIN_URL}
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        PUBLIC_SERVER_HTTP_URL: ${PUBLIC_SERVER_HTTP_URL}
        PUBLIC_SERVER_WS_URL: ${PUBLIC_SERVER_WS_URL}
    depends_on:
      - logic
    restart: unless-stopped
