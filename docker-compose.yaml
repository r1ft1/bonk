services:
  frontend:
    image: ghcr.io/r1ft1/bonk/frontend:${TAG:-main}
    networks:
      - coolify
      - default
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    image: ghcr.io/r1ft1/bonk/backend:${TAG:-main}
    networks:
      - coolify
      - default
    expose:
      - "8080"
    environment:
      - ENV=PROD
      - DB_PATH=/data/games.db
      - ORIGIN_URL=https://boop.oatmocha.com
    volumes:
      - game-data:/data

networks:
  coolify:
    external: true

volumes:
  game-data:
