services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./logic
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - ENV=PROD
      - DB_PATH=/data/games.db
    volumes:
      - game-data:/data

volumes:
  game-data:
