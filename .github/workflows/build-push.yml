name: Build and push images

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            PUBLIC_SERVER_HTTP_URL=https://boop.oatmocha.com
            PUBLIC_SERVER_WS_URL=wss://boop.oatmocha.com
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./logic
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Set image tag to commit SHA
        run: |
          set -euo pipefail
          API="${{ secrets.COOLIFY_API_URL }}/applications/${{ secrets.COOLIFY_APP_UUID }}/envs"
          AUTH="Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
          # Find and delete all existing TAG env vars
          ENVS=$(curl -sf "$API" -H "$AUTH")
          echo "$ENVS" | jq -r '.[] | select(.key=="TAG") | .uuid' 2>/dev/null | while read -r TAG_UUID; do
            if [ -n "$TAG_UUID" ]; then
              echo "Deleting old TAG env (uuid: $TAG_UUID)"
              curl -sf -X DELETE "${API}/${TAG_UUID}" -H "$AUTH"
            fi
          done
          # Create TAG with commit SHA
          echo "Creating TAG=${{ github.sha }}"
          curl -sf -X POST "$API" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d '{"key": "TAG", "value": "${{ github.sha }}", "is_buildtime": false, "is_runtime": true}'
      - name: Trigger Coolify deploy
        run: |
          curl -s "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
