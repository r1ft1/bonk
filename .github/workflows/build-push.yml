name: Build and push images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PUBLIC_SERVER_HTTP_URL=https://boop.oatmocha.com
            PUBLIC_SERVER_WS_URL=wss://boop.oatmocha.com
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./logic
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Set image tag to commit SHA
        run: |
          API="${{ secrets.COOLIFY_API_URL }}/applications/${{ secrets.COOLIFY_APP_UUID }}/envs"
          AUTH="Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
          # Find and delete existing TAG env var
          TAG_UUID=$(curl -s "$API" -H "$AUTH" | jq -r '.[] | select(.key=="TAG") | .uuid')
          if [ -n "$TAG_UUID" ]; then
            curl -s -X DELETE "${API}/${TAG_UUID}" -H "$AUTH"
          fi
          # Create TAG with commit SHA
          curl -s -X POST "$API" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d '{"key": "TAG", "value": "${{ github.sha }}", "is_buildtime": false, "is_runtime": true}'
      - name: Trigger Coolify deploy
        run: |
          curl -s "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
